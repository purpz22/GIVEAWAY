<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANEREY GIVEAWAY</title>
    <style>
        :root { --bg: #2d3436; --card: #353b48; --primary: #6c5ce7; --text: #dfe6e9; --accent: #00b894; --danger: #d63031; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { max-width: 1200px; width: 95%; display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; margin-top: 30px; }
        .sidebar { width: 350px; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .wheel-area { position: relative; width: 500px; height: 500px; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.6); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid white; z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        h1, h2, h3 { margin: 0 0 15px 0; }
        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: none; box-sizing: border-box; background: #dfe6e9; color: #2d3436; font-weight: bold; }
        .btn-host { background: var(--primary); color: white; }
        .btn-join { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .status-badge { background: #0984e3; padding: 8px; border-radius: 4px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        #entries-list { max-height: 350px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .entry { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85em; display: flex; align-items: center; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; display: inline-block; flex-shrink: 0;}
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; gap: 20px; }
        #game-screen { display: none; }
        #winner-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #winner-name { font-size: 4em; color: var(--accent); font-weight: bold; text-align: center; margin: 20px; text-shadow: 0 0 20px var(--accent); padding: 0 20px; }
        @media(max-width: 800px) { .wheel-area { width: 320px; height: 320px; } }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="font-size: 2.5rem; text-align:center;">ZANEREY GIVEAWAY<br><span style="font-size:0.6em; color:var(--accent);">PARA SA MGA CUTE🖕</span></h1>
        
        <button id="main-join-btn" onclick="initParticipant()" class="btn-join" style="width: 250px;">Join Giveaway</button>
        
        <!-- This area only updates if the secret key is used -->
        <p id="login-msg" style="color: #ff7675; font-weight: bold; text-align:center; max-width: 300px;"></p>
        <button id="force-host-btn" onclick="attemptHostLogin(true)" class="btn-danger" style="display:none; width: 250px;">⚠️ Force Takeover Host</button>
    </div>

    <div id="game-screen" class="container">
        <div class="wheel-area">
            <div class="pointer"></div>
            <canvas id="canvas" width="800" height="800"></canvas>
        </div>

        <div class="sidebar">
            <div id="status-badge" class="status-badge">WAITING...</div>
            
            <div id="host-panel" style="display:none;">
                <h3 style="border-bottom:1px solid #555; padding-bottom:10px;">👑 Host Controls</h3>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-size:0.8em">Entries per person:</label>
                        <input type="number" id="host-multiplier" value="1" min="1" max="10" onchange="updateSettings()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:0.8em">Spin Time (Sec):</label>
                        <input type="number" id="host-duration" value="7" min="3" max="60" onchange="updateSettings()">
                    </div>
                </div>
                <button id="btn-reg" onclick="toggleReg()" class="btn-join">Close Registration</button>
                <button onclick="spinWheel()" class="btn-danger" style="margin-top: 20px; font-size: 1.2rem;">🚀 SPIN WHEEL</button>
                <hr style="border: 0; border-top: 1px solid #555; margin: 20px 0;">
                <button onclick="resetGame()" style="background:#636e72;">Reset Game (Kick All)</button>
                <button onclick="logoutHost()" style="background:#2d3436; border: 1px solid #555; margin-top:5px; font-size:0.8em">Log Out Host</button>
            </div>

            <div id="participant-panel" style="display:none;">
                <h3>JOIN GIVEAWAY</h3>
                <input type="text" id="p-fbname" placeholder="Your FB Name (GC Name)">
                <input type="number" id="p-mlbbid" placeholder="MLBB ID (Unique)">
                <button id="btn-join-game" onclick="joinGame()" class="btn-join">Enter Giveaway</button>
                <p id="p-msg" style="color: orange; font-size: 0.9em; margin-top:10px; font-weight:bold;"></p>
            </div>

            <div style="margin-top: 30px;">
                <h3>Entries (<span id="count">0</span>)</h3>
                <div id="entries-list"></div>
            </div>
        </div>
    </div>

    <div id="winner-modal">
        <h2 style="color:white; letter-spacing: 2px;">THE WINNER IS</h2>
        <div id="winner-name">...</div>
        <button onclick="closeModal()" class="btn-host" style="width: 200px;">Close</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDha-EcP_E7GRH0_r1vv6ARN6smDMEbXnI",
          authDomain: "giveaway-wheel-66954.firebaseapp.com",
          projectId: "giveaway-wheel-66954",
          storageBucket: "giveaway-wheel-66954.firebasestorage.app",
          messagingSenderId: "878236162209",
          appId: "1:878236162209:web:7ed0bc87ad2666d195b8e0"
        };

        const SECRET_KEY = "Astrea999"; // <--- CHANGE THIS IF YOU WANT A DIFFERENT PASSWORD
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GAME_DOC_ID = "giveaway_room_1";

        let mySessionId = localStorage.getItem("mySessionId") || Math.random().toString(36).substring(2);
        localStorage.setItem("mySessionId", mySessionId);

        let myRole = null;
        let gameState = { entries: [], isSpinning: false, startRotation: 0, targetRotation: 0, spinStartTime: 0, duration: 7000, settingDuration: 7000, winner: null, isRegOpen: true };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colors = ['#e17055', '#00b894', '#0984e3', '#6c5ce7', '#fdcb6e', '#d63031', '#e84393'];

        // On Load: Check if URL has the secret key
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('key') === SECRET_KEY) {
                attemptHostLogin(false);
            }
        });

        window.attemptHostLogin = async (force = false) => {
            const msg = document.getElementById('login-msg');
            const forceBtn = document.getElementById('force-host-btn');
            msg.innerText = "Checking Admin Access...";
            
            try {
                await runTransaction(db, async (transaction) => {
                    const sfDocRef = doc(db, "games", GAME_DOC_ID);
                    const sfDoc = await transaction.get(sfDocRef);

                    if (!sfDoc.exists()) {
                        transaction.set(sfDocRef, { hostId: mySessionId, entries: [], isRegOpen: true, isSpinning: false, targetRotation: 0, winner: null, multiplier: 1, settingDuration: 7000 });
                        return;
                    }

                    const data = sfDoc.data();
                    // Allow login if slot is empty, if it's already you, OR if you click FORCE
                    if (!data.hostId || data.hostId === mySessionId || force === true) {
                        transaction.update(sfDocRef, { hostId: mySessionId });
                    } else {
                        throw "⛔ Another host is already active (Locked).";
                    }
                });
                initHost();
            } catch (e) {
                msg.innerText = e;
                if (e.includes("Locked")) forceBtn.style.display = "block";
            }
        };

        window.initParticipant = () => {
            myRole = 'participant'; switchScreen();
            document.getElementById('participant-panel').style.display = 'block';
            listenToGame(); requestAnimationFrame(renderLoop);
        };

        function initHost() {
            myRole = 'host'; switchScreen();
            document.getElementById('host-panel').style.display = 'block';
            listenToGame(); requestAnimationFrame(renderLoop);
        }

        function switchScreen() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        window.logoutHost = async () => {
             if(confirm("Log out? This will unlock the host slot.")) {
                 await updateDoc(doc(db, "games", GAME_DOC_ID), { hostId: null });
                 window.location.href = window.location.pathname; 
             }
        }

        window.closeModal = () => document.getElementById('winner-modal').style.display = 'none';

        function listenToGame() {
            onSnapshot(doc(db, "games", GAME_DOC_ID), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    Object.assign(gameState, data);
                    document.getElementById('count').innerText = gameState.entries.length;
                    renderEntriesList();
                    updateUI(data);
                }
            });
        }

        function updateUI(data) {
            if(myRole === 'host') {
                if(data.multiplier && document.activeElement.id !== 'host-multiplier') document.getElementById('host-multiplier').value = data.multiplier;
                if(data.settingDuration && document.activeElement.id !== 'host-duration') document.getElementById('host-duration').value = data.settingDuration / 1000;
            }
            const badge = document.getElementById('status-badge');
            if (data.winner) {
                badge.innerText = "🏆 WINNER FOUND"; badge.style.background = "var(--accent)";
                document.getElementById('winner-name').innerText = data.winner;
                document.getElementById('winner-modal').style.display = 'flex';
            } else if (data.isSpinning) {
                badge.innerText = "🔥 WHEEL SPINNING 🔥"; badge.style.background = "#d63031";
            } else {
                badge.innerText = data.isRegOpen ? "REGISTRATION OPEN" : "REGISTRATION CLOSED";
                badge.style.background = data.isRegOpen ? "#0984e3" : "#636e72";
            }
            if(myRole === 'host') {
                const regBtn = document.getElementById('btn-reg');
                regBtn.innerText = data.isRegOpen ? "Close Registration" : "Open Registration";
                regBtn.className = data.isRegOpen ? "btn-join" : "btn-danger";
            } else {
                const joinBtn = document.getElementById('btn-join-game');
                joinBtn.disabled = !data.isRegOpen;
                joinBtn.style.background = data.isRegOpen ? "var(--accent)" : "#555";
                joinBtn.innerText = data.isRegOpen ? "Enter Giveaway" : "Registration Closed";
            }
        }

        window.updateSettings = async () => {
             const mult = parseInt(document.getElementById('host-multiplier').value) || 1;
             const durSec = parseInt(document.getElementById('host-duration').value) || 7;
             await updateDoc(doc(db, "games", GAME_DOC_ID), { multiplier: mult, settingDuration: durSec * 1000 });
        }

        window.toggleReg = async () => await updateDoc(doc(db, "games", GAME_DOC_ID), { isRegOpen: !gameState.isRegOpen });

        window.spinWheel = async () => {
            if(gameState.entries.length < 2) return alert("Need at least 2 entries!");
            const currentRot = getCurrentRotation(); 
            const duration = gameState.settingDuration || 7000;
            const target = currentRot + (360 * (duration / 1000)) + Math.floor(Math.random() * 360);
            await updateDoc(doc(db, "games", GAME_DOC_ID), { isSpinning: true, startRotation: currentRot, targetRotation: target, spinStartTime: Date.now(), duration: duration, winner: null });
            setTimeout(() => handleElimination(target), duration + 500);
        };

        async function handleElimination(finalRotation) {
            const numSegments = gameState.entries.length;
            if(numSegments === 0) return;
            const arc = 360 / numSegments;
            const index = Math.floor(((360 - (finalRotation % 360) + 270) % 360) / arc);
            const newEntries = [...gameState.entries];
            if(index >= 0 && index < newEntries.length) newEntries.splice(index, 1);
            let updates = { isSpinning: false, entries: newEntries };
            if(newEntries.length === 1) updates.winner = newEntries[0].name;
            await updateDoc(doc(db, "games", GAME_DOC_ID), updates);
        }

        window.resetGame = async () => {
            if(confirm("Reset game?")) {
                await setDoc(doc(db, "games", GAME_DOC_ID), { hostId: mySessionId, entries: [], isRegOpen: true, isSpinning: false, targetRotation: 0, winner: null, multiplier: 1, settingDuration: 7000 });
            }
        };

        window.joinGame = async () => {
            const fbName = document.getElementById('p-fbname').value.trim();
            const mlbbId = document.getElementById('p-mlbbid').value.trim();
            const pMsg = document.getElementById('p-msg');
            if(!fbName || !mlbbId) { pMsg.innerText = "❌ Fill all fields!"; return; }
            try {
                await runTransaction(db, async (transaction) => {
                    const sfDoc = await transaction.get(doc(db, "games", GAME_DOC_ID));
                    const data = sfDoc.data();
                    if(!data.isRegOpen) throw "Registration Closed";
                    if(data.entries.some(entry => entry.mlbbId === mlbbId)) throw "MLBB ID already joined!";
                    const newEntries = [...data.entries];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    for(let i=0; i<(data.multiplier || 1); i++) {
                        newEntries.push({ name: `${fbName} (${mlbbId})`, mlbbId: mlbbId, color: color, id: Date.now() + Math.random() });
                    }
                    transaction.update(doc(db, "games", GAME_DOC_ID), { entries: newEntries });
                });
                pMsg.innerText = "✅ Joined!"; pMsg.style.color = "#00b894";
            } catch (e) { pMsg.innerText = "❌ " + e; pMsg.style.color = "#d63031"; }
        };

        function easeOut(t) { return (--t)*t*t+1; }
        function getCurrentRotation() {
            if (!gameState.isSpinning) return gameState.targetRotation;
            const elapsed = Date.now() - gameState.spinStartTime;
            if (elapsed >= gameState.duration) return gameState.targetRotation;
            return gameState.startRotation + (gameState.targetRotation - gameState.startRotation) * easeOut(elapsed / gameState.duration);
        }

        function renderLoop() {
            const rotation = getCurrentRotation();
            drawWheel(rotation);
            requestAnimationFrame(renderLoop);
        }

        function drawWheel(currentRotation) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState.entries.length === 0) return;
            const arc = (2 * Math.PI) / gameState.entries.length;
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate((currentRotation * Math.PI) / 180);
            gameState.entries.forEach((entry, i) => {
                const angle = i * arc;
                ctx.beginPath(); ctx.fillStyle = entry.color; ctx.moveTo(0, 0); ctx.arc(0, 0, canvas.width/2 - 10, angle, angle + arc); ctx.lineTo(0, 0); ctx.fill();
                ctx.save(); ctx.rotate(angle + arc / 2); ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 28px Segoe UI"; ctx.shadowColor="black"; ctx.shadowBlur=4;
                let name = entry.name; if(name.length > 18) name = name.substring(0, 16) + "..";
                ctx.fillText(name, canvas.width/2 - 40, 8); ctx.restore();
            });
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, 2 * Math.PI); ctx.fillStyle = "white"; ctx.fill(); ctx.restore();
        }

        function renderEntriesList() {
            document.getElementById('entries-list').innerHTML = gameState.entries.map(e => `<div class="entry"><span class="dot" style="background:${e.color}"></span><span>${e.name}</span></div>`).join('');
        }
    </script>
</body>
</html>
